document:
  id: "16-research-decisions.background-cache-locking-decision"
  title: "IoTable Background Jobs, Cache, and Locking Decision"
  project: "IoTable"
  version: "1.0.0"
  language: "en"
  format: "yaml"
  schema_required: true
  schema_file: "schemas/16-research-decisions/background-cache-locking-decision.schema.json"
  status: "draft"

purpose:
  rule: "Define the selected background job library, job storage, distributed cache, and distributed locking technologies for IoTable."
  applies_to:
    - "IoTable.Worker"
    - "platform_provisioning_jobs"
    - "platform_schema_orchestration"
    - "customer_access_security"
    - "rate_limiting"
    - "runtime_coordination"

selected_technologies:
  background_jobs:
    library: "Hangfire"
    storage: "PostgreSQL"
    host: "IoTable.Worker"
    dashboard_policy: "disabled_or_platform_owner_only"
  distributed_cache:
    technology: "Redis"
    dotnet_abstraction: "IDistributedCache"
    package_family: "Microsoft.Extensions.Caching.StackExchangeRedis"
  distributed_locking:
    platform_jobs: "PostgreSQL advisory locks"
    rate_limit_and_ephemeral_coordination: "Redis"

research_record:
  decision_id: "BCL-DEC-001"
  topic: "Background jobs, distributed cache, and distributed locking"
  status: "accepted"
  problem: "IoTable requires durable background processing, ephemeral runtime coordination, and critical per-tenant concurrency protection without introducing microservices."
  selected_option: "hangfire_postgresql_redis_postgresql_advisory_locks"
  options:
    - id: "hangfire_postgresql_redis_postgresql_advisory_locks"
      description: "Use Hangfire with PostgreSQL storage, Redis through IDistributedCache, PostgreSQL advisory locks for critical platform jobs, and Redis locks only for short-lived runtime coordination."
      advantages:
        - "Keeps durable job state in PostgreSQL-backed infrastructure."
        - "Supports recurring, delayed, continuation, and fire-and-forget job workflows."
        - "Keeps critical tenant lifecycle and schema mutation locking close to platform database state."
        - "Uses Redis only for ephemeral cache and coordination state."
      disadvantages:
        - "Requires explicit IoTable platform job tables because Hangfire tables are not the application source of truth."
        - "Requires advisory lock key discipline for per-tenant critical sections."
      fit_score: 5
      source_support:
        - "SRC-BCL-001"
        - "SRC-BCL-002"
        - "SRC-BCL-003"
        - "SRC-BCL-004"
    - id: "hangfire_redis_locks_for_all_coordination"
      description: "Use Hangfire and Redis locks for both ephemeral and durable mutation coordination."
      advantages:
        - "Uses one runtime coordination dependency."
      disadvantages:
        - "Allows durable lifecycle mutation safety to depend on ephemeral infrastructure."
        - "Conflicts with IoTable platform database source-of-truth requirements."
      fit_score: 2
      source_support:
        - "SRC-BCL-002"
        - "SRC-BCL-004"
    - id: "custom_background_worker_without_hangfire"
      description: "Implement background job persistence, retry, scheduling, and inspection directly inside IoTable."
      advantages:
        - "Avoids dependency on a background job framework."
      disadvantages:
        - "Creates custom scheduling and retry infrastructure."
        - "Increases implementation risk for LLM coding agents."
      fit_score: 1
      source_support:
        - "SRC-BCL-001"
  source_records:
    - source_id: "SRC-BCL-001"
      source_type: "official_technical_documentation"
      authority_level: "high"
      locator: "https://docs.hangfire.io/"
      retrieved_at: "2026-05-02"
      used_for:
        - "background_job_library_fit"
      extracted_facts:
        - "Hangfire provides persistent background processing for .NET applications."
        - "Hangfire supports fire-and-forget, delayed, recurring, and continuation jobs."
      limitations:
        - "Hangfire documentation does not define IoTable product job visibility requirements."
      spec_impact:
        - "IoTable.Worker uses Hangfire for background processing."
    - source_id: "SRC-BCL-002"
      source_type: "official_technical_documentation"
      authority_level: "high"
      locator: "https://learn.microsoft.com/aspnet/core/performance/caching/distributed"
      retrieved_at: "2026-05-02"
      used_for:
        - "distributed_cache_abstraction"
      extracted_facts:
        - "ASP.NET Core supports distributed cache through IDistributedCache."
        - "Redis is a supported distributed cache provider through Microsoft.Extensions.Caching.StackExchangeRedis."
      limitations:
        - "Distributed cache documentation does not define durable application state ownership."
      spec_impact:
        - "Redis is used through IDistributedCache and treated as ephemeral infrastructure."
    - source_id: "SRC-BCL-003"
      source_type: "official_technical_documentation"
      authority_level: "high"
      locator: "https://www.postgresql.org/docs/17/explicit-locking.html#ADVISORY-LOCKS"
      retrieved_at: "2026-05-02"
      used_for:
        - "critical_platform_job_locking"
      extracted_facts:
        - "PostgreSQL provides advisory locks that applications can use for application-defined locking."
      limitations:
        - "PostgreSQL documentation defines locking primitives, not IoTable job semantics."
      spec_impact:
        - "Critical platform tenant lifecycle and schema jobs use PostgreSQL advisory locks."
    - source_id: "SRC-BCL-004"
      source_type: "official_technical_documentation"
      authority_level: "high"
      locator: "https://redis.io/docs/latest/develop/"
      retrieved_at: "2026-05-02"
      used_for:
        - "ephemeral_cache_and_runtime_coordination"
      extracted_facts:
        - "Redis is an in-memory data store used for caching and short-lived coordination patterns."
      limitations:
        - "Redis documentation does not define IoTable durable state recovery requirements."
      spec_impact:
        - "Redis is not the source of truth for IoTable platform or tenant operational state."
  fit_assessment:
    correctness: "selected_option_keeps_durable_job_truth_in_platform_tables_and_postgresql"
    security: "selected_option_separates_ephemeral_cache_from_durable_lifecycle_state"
    maintainability: "selected_option_uses_documented_framework_and_database_primitives"
    operational_simplicity: "selected_option_avoids_custom_job_scheduler_and_microservice_split"
    llm_implementability: "selected_option_has_explicit_library_and_locking_boundaries"
    performance: "selected_option_uses_redis_for_short_lived_cache_and_postgresql_for_critical_serialisation"
    developer_convenience: "selected_option_uses_common_dotnet_abstractions"
    cost_efficiency: "selected_option_reuses_postgresql_for_job_storage_and_critical_locks"
  risks:
    - id: "BCL-RISK-001"
      risk: "Hangfire internal tables may be mistaken for IoTable platform job source-of-truth tables."
      mitigation: "IoTable platform job tables remain the application-facing source of truth."
    - id: "BCL-RISK-002"
      risk: "Redis may be used for durable lifecycle state by mistake."
      mitigation: "Redis durable state usage is forbidden by integration rules and forbidden behavior."
    - id: "BCL-RISK-003"
      risk: "Advisory lock keys may collide if not derived deterministically."
      mitigation: "Lock keys are derived from stable job type and tenant identifier."

background_job_decision:
  selected: "Hangfire"
  storage: "PostgreSQL"
  used_for:
    - "tenant_provisioning_jobs"
    - "tenant_schema_change_jobs"
    - "maintenance_jobs"
    - "scheduled_operational_tasks"
  rules:
    - "Background jobs MUST execute through IoTable.Worker."
    - "Hangfire storage MUST use PostgreSQL."
    - "Provisioning jobs MUST remain resumable and inspectable through platform APIs and platform UI."
    - "Schema change jobs MUST remain resumable and inspectable through platform APIs and platform UI."
    - "Hangfire dashboard MUST NOT be publicly exposed."
    - "If Hangfire dashboard is enabled, it MUST be protected by platform_owner authorization."
    - "Application-facing job status MUST be represented in IoTable platform tables, not only in Hangfire internal tables."
  rationale:
    - "Hangfire is practical for persistent background processing in .NET."
    - "Hangfire supports fire-and-forget, delayed, recurring, and continuation job workflows needed by IoTable."
    - "PostgreSQL storage avoids introducing an additional job persistence database."
    - "IoTable requires operationally visible provisioning and schema job state."

cache_decision:
  selected: "Redis"
  abstraction: "IDistributedCache"
  used_for:
    - "rate_limit_counters"
    - "abuse_detection_counters"
    - "short_lived_customer_access_runtime_state"
    - "ephemeral_runtime_coordination"
  not_used_for:
    - "source_of_truth_data"
    - "tenant_operational_data"
    - "platform_audit_log"
    - "provisioning_job_source_of_truth"
  rules:
    - "Redis MUST NOT be the source of truth for platform lifecycle state."
    - "Redis MUST NOT be the source of truth for tenant operational state."
    - "Redis MAY store short-lived counters and runtime coordination state."
    - "Redis entries MUST have explicit TTL unless a documented exception exists."
    - "Critical state MUST be recoverable without Redis data."

locking_decision:
  platform_job_locking:
    selected: "PostgreSQL advisory locks"
    used_for:
      - "tenant_provisioning_job_exclusion"
      - "tenant_schema_change_job_exclusion"
      - "per_tenant_platform_job_serialisation"
    rules:
      - "Platform provisioning and schema jobs MUST use PostgreSQL advisory locks for critical per-tenant execution exclusion."
      - "Advisory locks MUST be scoped by stable lock keys derived from job type and tenant identifier."
      - "Critical lock acquisition and state transition MUST be atomic with platform database state checks where applicable."
      - "The system MUST reject or defer concurrent platform jobs that would mutate the same tenant lifecycle or schema state."
  ephemeral_locking:
    selected: "Redis"
    used_for:
      - "rate_limit_coordination"
      - "short_lived_abuse_control"
      - "non_critical_ephemeral_runtime_coordination"
    rules:
      - "Redis locks MUST NOT protect durable platform lifecycle mutations."
      - "Redis locks MAY protect short-lived abuse-control flows."
      - "Redis locks MUST use TTL."

integration_rules:
  - id: "BCL-001"
    rule: "IoTable.Worker MUST run background jobs outside the HTTP request pipeline."
  - id: "BCL-002"
    rule: "Platform job source-of-truth state MUST be stored in IoTable platform tables."
  - id: "BCL-003"
    rule: "Hangfire internal tables MUST NOT replace IoTable platform job contract tables."
  - id: "BCL-004"
    rule: "Redis MUST be treated as ephemeral infrastructure."
  - id: "BCL-005"
    rule: "PostgreSQL advisory locks MUST protect critical platform job concurrency."
  - id: "BCL-006"
    rule: "Distributed cache and lock failures MUST fail safely for security-sensitive customer flows."

forbidden_behavior:
  - "background_jobs_only_inside_IoTable.Api_request_pipeline"
  - "hangfire_dashboard_publicly_exposed"
  - "redis_as_source_of_truth_for_platform_state"
  - "redis_as_source_of_truth_for_tenant_operational_state"
  - "redis_lock_for_critical_tenant_schema_mutation_without_database_state_guard"
  - "platform_job_without_concurrency_guard"

open_decisions: []

done_when:
  - "background_job_library_is_selected"
  - "background_job_storage_is_selected"
  - "distributed_cache_is_selected"
  - "platform_job_locking_is_selected"
  - "ephemeral_locking_policy_is_defined"
  - "integration_rules_are_defined"
  - "forbidden_behavior_is_defined"
