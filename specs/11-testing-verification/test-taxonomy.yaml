document:
  id: "11-testing-verification.test-taxonomy"
  title: "IoTable Test Taxonomy"
  project: "IoTable"
  version: "1.0.0"
  language: "en"
  format: "yaml"
  schema_required: true
  schema_file: "schemas/11-testing-verification/test-taxonomy.schema.json"
  status: "draft"

purpose:
  rule: "Define the verification tiers used by IoTable implementation tasks and release checks."
  applies_to:
    - "specification_validation"
    - "backend_tests"
    - "frontend_tests"
    - "api_contract_tests"
    - "database_contract_tests"
    - "device_contract_tests"
    - "security_tests"
    - "operational_smoke_tests"

taxonomy_rules:
  - id: "TT-001"
    rule: "Every implementation task MUST identify the verification tiers affected by the task."
  - id: "TT-002"
    rule: "A task that changes a public or internal API contract MUST include API contract verification."
  - id: "TT-003"
    rule: "A task that changes database schema, indexes, constraints, seed data, or ownership rules MUST include database contract verification."
  - id: "TT-004"
    rule: "A task that changes authentication, authorization, customer access, device identity, token handling, or secret handling MUST include security verification."
  - id: "TT-005"
    rule: "A task that changes a user-facing workflow MUST include workflow-level verification."
  - id: "TT-006"
    rule: "A task that changes deployment, health checks, configuration, background jobs, or recovery behavior MUST include operational verification."
  - id: "TT-007"
    rule: "Specification validation MUST pass before implementation verification is considered complete."

tiers:
  - id: "spec_validation"
    purpose: "Verify that YAML specifications and JSON schemas are structurally valid and mutually complete."
    required_when:
      - "any_specification_yaml_changes"
      - "any_specification_schema_changes"
      - "documentation_index_changes"
    verifies:
      - "yaml_has_matching_schema"
      - "schema_has_matching_yaml"
      - "specification_documents_validate_against_schemas"
      - "documentation_index_references_existing_documents"
  - id: "unit"
    purpose: "Verify deterministic logic inside a small implementation unit."
    required_when:
      - "domain_rule_changes"
      - "pure_validation_logic_changes"
      - "calculation_logic_changes"
      - "mapping_logic_changes"
    verifies:
      - "domain_invariants"
      - "validation_branches"
      - "calculation_results"
      - "error_paths_inside_unit"
  - id: "integration"
    purpose: "Verify coordination between application services, persistence, authorization, background processing, and realtime components."
    required_when:
      - "application_service_changes"
      - "authorization_enforcement_changes"
      - "persistence_behavior_changes"
      - "background_job_behavior_changes"
      - "device_realtime_behavior_changes"
    verifies:
      - "module_boundary_behavior"
      - "database_interaction"
      - "authorization_policy_effect"
      - "transactional_behavior"
      - "realtime_message_flow"
  - id: "api_contract"
    purpose: "Verify HTTP request, response, authentication, authorization, error, pagination, and idempotency contracts."
    required_when:
      - "api_route_changes"
      - "request_schema_changes"
      - "response_schema_changes"
      - "api_error_model_changes"
      - "authentication_requirement_changes"
    verifies:
      - "route_namespace"
      - "request_validation"
      - "response_shape"
      - "error_shape"
      - "authentication_and_authorization_requirements"
  - id: "database_contract"
    purpose: "Verify database table, column, index, constraint, relationship, ownership, and migration contracts."
    required_when:
      - "data_contract_changes"
      - "schema_migration_changes"
      - "tenant_isolation_rule_changes"
      - "seed_data_changes"
      - "database_constraint_changes"
    verifies:
      - "table_and_column_shape"
      - "required_constraints"
      - "tenant_data_isolation"
      - "migration_application"
      - "seed_data_presence"
  - id: "workflow"
    purpose: "Verify complete user, staff, platform, customer, and device workflows across multiple implementation boundaries."
    required_when:
      - "customer_ordering_flow_changes"
      - "tenant_setup_flow_changes"
      - "platform_lifecycle_flow_changes"
      - "bill_closure_flow_changes"
      - "station_workflow_changes"
      - "firmware_generation_flow_changes"
    verifies:
      - "end_to_end_flow_outcome"
      - "cross_boundary_state_changes"
      - "required_authorization_gates"
      - "visible_user_result"
  - id: "security"
    purpose: "Verify security-sensitive invariants for identity, authorization, customer access, device secrets, QR tokens, and secret handling."
    required_when:
      - "authentication_changes"
      - "authorization_changes"
      - "qr_token_changes"
      - "customer_session_changes"
      - "device_secret_changes"
      - "firmware_artifact_changes"
      - "logging_of_sensitive_data_changes"
    verifies:
      - "least_privilege"
      - "tenant_scope_enforcement"
      - "token_single_use"
      - "secret_not_logged"
      - "plaintext_secret_storage_forbidden"
  - id: "operational_smoke"
    purpose: "Verify that a deployed runtime is routable, observable, and operationally ready for basic traffic."
    required_when:
      - "deployment_changes"
      - "health_check_changes"
      - "configuration_changes"
      - "background_job_runtime_changes"
      - "reverse_proxy_or_domain_changes"
    verifies:
      - "backend_process_routability"
      - "health_endpoint_behavior"
      - "database_connectivity"
      - "background_job_availability"
      - "frontend_deployable_availability"

verification_mapping:
  acceptance_criteria_document: "specs/11-testing-verification/acceptance-criteria.yaml"
  mapping_rule: "Each acceptance criterion MUST be verifiable by at least one taxonomy tier."
  implementation_done_rule: "An implementation task is not done until every affected taxonomy tier has an explicit verification result or a recorded blocker."

release_verification_commands:
  command_sets:
    - id: "spec_repository_validation"
      command: "pnpm validate"
      run_from: "specification_repository_root"
      required_when:
        - "any_specification_yaml_changes"
        - "any_specification_schema_changes"
        - "documentation_index_changes"
      verifies:
        - "specification_documents_validate_against_schemas"
        - "documentation_index_references_existing_documents"
    - id: "backend_test_suite"
      command: "dotnet test"
      run_from: "implementation_repository_root"
      required_when:
        - "backend_code_changes"
        - "backend_contract_changes"
        - "database_contract_changes"
        - "authorization_or_security_changes"
      verifies:
        - "unit"
        - "integration"
        - "api_contract"
        - "database_contract"
        - "security"
    - id: "frontend_build"
      command: "pnpm build"
      run_from: "frontend_workspace_root"
      required_when:
        - "next_js_or_react_code_changes"
        - "frontend_route_changes"
        - "frontend_contract_changes"
      verifies:
        - "frontend_deployable_availability"
        - "frontend_compile_time_contracts"
    - id: "frontend_test_suite"
      command: "pnpm test"
      run_from: "frontend_workspace_root"
      required_when:
        - "frontend_behavior_changes"
        - "user_facing_workflow_changes"
      verifies:
        - "workflow"
        - "frontend_interaction_behavior"
    - id: "operational_health_smoke"
      command: "HTTP GET /health/live and /health/ready against the deployed backend hosts defined in specs/12-operations-deployment/health-checks.yaml"
      run_from: "deployed_environment"
      required_when:
        - "deployment_changes"
        - "health_check_changes"
        - "configuration_changes"
        - "release_candidate_verification"
      verifies:
        - "backend_process_routability"
        - "health_endpoint_behavior"
        - "readiness_dependency_gate"
  rules:
    - "Required command sets MUST be reported with pass, fail, or blocked status before an implementation task is considered done."
    - "If a required command does not exist in the current repository state, the verification result MUST be recorded as blocked with the missing command named explicitly."
    - "Ad hoc manual inspection MUST NOT replace a required executable command set."

source_alignment:
  authoritative_project_documents:
    - "specs/00-meta/specification-constitution.yaml"
    - "specs/00-meta/llm-execution-policy.yaml"
    - "specs/11-testing-verification/acceptance-criteria.yaml"
  reference_documents_used_as_inspiration:
    - "C:\\Users\\Victus\\Desktop\\dr\\2\\docs\\explanation\\concepts\\test-taxonomy.md"
  reference_fit_rule: "Reference test tier names may inspire structure but MUST NOT add timing budgets, framework choices, or CI commands that are not defined by IoTable specifications."

open_questions: []

done_when:
  - "verification_tiers_are_defined"
  - "required_when_rules_are_defined"
  - "verification_scope_is_defined_for_each_tier"
  - "acceptance_criteria_mapping_rule_is_defined"
  - "release_verification_commands_are_defined"
