document:
  id: "03-domain.module-inventory"
  title: "IoTable Module Inventory"
  project: "IoTable"
  version: "1.0.0"
  language: "en"
  format: "yaml"
  schema_required: true
  schema_file: "schemas/03-domain/module-inventory.schema.json"
  status: "draft"

purpose:
  rule: "Define the complete business capability module inventory used to structure IoTable architecture, data ownership, API ownership, UI surface ownership, and implementation planning."
  partitioning_method: "business_capability_boundary"
  forbidden_primary_partitioning_methods:
    - "frontend_backend_split"
    - "stakeholder_split"
    - "screen_split"
    - "route_split"
  rule_detail: "Frontend, backend, data, API, tests, and operations are implementation aspects inside capability modules."

module_classification:
  platform_scope: "Module owns platform-level control plane behavior or platform database data."
  tenant_scope: "Module owns tenant operational behavior or tenant database data."
  shared_scope: "Module provides cross-cutting behavior used by platform and tenant modules."
  external_scope: "Module represents out-of-system behavior or explicitly excluded integration."

modules:
  - id: "platform_tenant_lifecycle"
    name: "Platform Tenant Lifecycle"
    scope: "platform_scope"
    responsibility: "Own tenant registry, tenant domain records, lifecycle status, provisioning initiation, suspension, deactivation, and reactivation."
    owns_data:
      - "tenant_registry"
      - "tenant_domain_registry"
      - "tenant_lifecycle_status"
    owns_surfaces:
      - "platform_control_plane"
    owns_api_families:
      - "platform_api"
    depends_on:
      - "platform_identity_access"
      - "platform_provisioning_jobs"
      - "platform_audit"
    done_when:
      - "tenant_lifecycle_rules_defined"
      - "tenant_status_transitions_defined"
      - "tenant_registry_contracts_defined"

  - id: "platform_provisioning_jobs"
    name: "Platform Provisioning Jobs"
    scope: "platform_scope"
    responsibility: "Own tenant database creation, schema application, seed execution, activation invite creation, provisioning job tracking, and resumable provisioning failure handling."
    owns_data:
      - "tenant_provisioning_jobs"
      - "tenant_database_registry"
      - "provisioning_job_runs"
    owns_surfaces:
      - "platform_control_plane"
    owns_api_families:
      - "platform_api"
    depends_on:
      - "platform_tenant_lifecycle"
      - "platform_database_schema_orchestration"
      - "platform_audit"
    done_when:
      - "provisioning_flow_defined"
      - "failure_and_retry_policy_defined"
      - "job_visibility_defined"

  - id: "platform_database_schema_orchestration"
    name: "Platform Database Schema Orchestration"
    scope: "platform_scope"
    responsibility: "Own platform-level execution of tenant database schema change jobs, per-tenant schema version inspection, failure isolation, and resumable schema updates."
    owns_data:
      - "tenant_schema_change_jobs"
      - "tenant_schema_change_job_runs"
      - "tenant_schema_versions"
    owns_surfaces:
      - "platform_control_plane"
    owns_api_families:
      - "platform_api"
    depends_on:
      - "platform_tenant_lifecycle"
      - "platform_audit"
    done_when:
      - "tenant_schema_change_job_model_defined"
      - "per_tenant_version_tracking_defined"
      - "resumability_defined"

  - id: "platform_identity_access"
    name: "Platform Identity and Access"
    scope: "platform_scope"
    responsibility: "Own platform users, platform roles, platform permissions, authentication integration, and platform authorization enforcement."
    owns_data:
      - "platform_users"
      - "platform_roles"
      - "platform_permissions"
      - "platform_user_role_assignments"
    owns_surfaces:
      - "identity_activation"
      - "platform_control_plane"
    owns_api_families:
      - "platform_api"
    depends_on:
      - "shared_authentication_runtime"
      - "platform_audit"
    done_when:
      - "platform_permission_catalog_defined"
      - "platform_role_permission_matrix_defined"
      - "platform_authentication_flow_defined"

  - id: "tenant_identity_access"
    name: "Tenant Identity and Access"
    scope: "tenant_scope"
    responsibility: "Own tenant users, tenant roles, tenant permissions, tenant activation, tenant login behavior, and tenant authorization enforcement."
    owns_data:
      - "tenant_users"
      - "tenant_roles"
      - "tenant_permissions"
      - "tenant_user_role_assignments"
    owns_surfaces:
      - "identity_activation"
      - "tenant_setup_console"
      - "floor_cash_workspace"
      - "station_board"
    owns_api_families:
      - "tenant_internal_api"
    depends_on:
      - "shared_authentication_runtime"
      - "tenant_audit"
    done_when:
      - "tenant_permission_catalog_defined"
      - "tenant_role_permission_matrix_defined"
      - "tenant_activation_flow_defined"

  - id: "shared_authentication_runtime"
    name: "Shared Authentication Runtime"
    scope: "shared_scope"
    responsibility: "Own ASP.NET Core Identity, OpenIddict, token issuing, token validation, login, password change, 2FA, and policy authorization runtime rules."
    owns_data:
      - "identity_users"
      - "identity_credentials"
      - "oidc_applications"
      - "oidc_tokens"
      - "auth_sessions"
    owns_surfaces:
      - "identity_activation"
    owns_api_families:
      - "platform_api"
      - "tenant_internal_api"
    depends_on: []
    done_when:
      - "authentication_stack_contracts_defined"
      - "token_claim_contracts_defined"
      - "policy_authorization_contracts_defined"

  - id: "tenant_setup_configuration"
    name: "Tenant Setup and Configuration"
    scope: "tenant_scope"
    responsibility: "Own tenant-level settings required before operation, including restaurant profile, operational preferences, table setup, station setup, and initial configuration readiness."
    owns_data:
      - "tenant_settings"
      - "restaurant_profile"
      - "setup_completion_state"
    owns_surfaces:
      - "tenant_setup_console"
    owns_api_families:
      - "tenant_internal_api"
    depends_on:
      - "tenant_identity_access"
      - "tenant_tables"
      - "tenant_stations"
      - "tenant_menu_catalog"
    done_when:
      - "setup_required_fields_defined"
      - "setup_completion_rules_defined"
      - "configuration_validation_defined"

  - id: "tenant_tables"
    name: "Tenant Tables"
    scope: "tenant_scope"
    responsibility: "Own restaurant table records, table identifiers, table display numbers, table operational state, and table availability used by floor, customer, and device flows."
    owns_data:
      - "tables"
      - "table_numbers"
      - "table_operational_state"
    owns_surfaces:
      - "tenant_setup_console"
      - "floor_cash_workspace"
    owns_api_families:
      - "tenant_internal_api"
      - "customer_public_api"
    depends_on:
      - "tenant_identity_access"
    done_when:
      - "table_identity_contract_defined"
      - "table_state_contract_defined"
      - "table_number_rules_defined"

  - id: "tenant_stations"
    name: "Tenant Stations"
    scope: "tenant_scope"
    responsibility: "Own preparation station records, station codes, station active state, station assignment eligibility, and station board visibility."
    owns_data:
      - "stations"
      - "station_codes"
      - "station_active_state"
    owns_surfaces:
      - "tenant_setup_console"
      - "station_board"
    owns_api_families:
      - "tenant_internal_api"
    depends_on:
      - "tenant_identity_access"
    done_when:
      - "station_identity_contract_defined"
      - "station_code_stability_rule_defined"
      - "station_active_state_rules_defined"

  - id: "tenant_menu_catalog"
    name: "Tenant Menu Catalog"
    scope: "tenant_scope"
    responsibility: "Own menu categories, menu items, prices, item availability, orderability, and menu item station assignment."
    owns_data:
      - "menu_categories"
      - "menu_items"
      - "menu_item_prices"
      - "menu_item_availability"
      - "menu_item_station_assignment"
    owns_surfaces:
      - "tenant_setup_console"
      - "customer_ordering"
    owns_api_families:
      - "tenant_internal_api"
      - "customer_public_api"
    depends_on:
      - "tenant_stations"
      - "tenant_identity_access"
    done_when:
      - "menu_item_contract_defined"
      - "price_rules_defined"
      - "station_assignment_required_for_orderable_items"

  - id: "customer_qr_presence"
    name: "Customer QR Presence"
    scope: "tenant_scope"
    responsibility: "Own server-generated rotating QR tokens, token hashing, token validation, single-use token behavior, invalid QR recovery pages, and presence proof for customer actions."
    owns_data:
      - "qr_token_registry"
      - "qr_token_hashes"
      - "qr_rotation_state"
      - "qr_invalid_attempt_log"
    owns_surfaces:
      - "customer_ordering"
      - "table_device_endpoint"
    owns_api_families:
      - "customer_public_api"
    depends_on:
      - "tenant_tables"
      - "tenant_customer_sessions"
      - "tenant_audit"
    done_when:
      - "qr_rotation_registry_design_defined"
      - "atomic_consume_rules_defined"
      - "invalid_qr_recovery_behavior_defined"

  - id: "tenant_customer_sessions"
    name: "Tenant Customer Sessions"
    scope: "tenant_scope"
    responsibility: "Own customer guest access, customer session continuity, customer relationship to table context, and customer ability to use menu, cart, order, and bill views."
    owns_data:
      - "guest_sessions"
      - "guest_session_table_context"
      - "guest_session_bill_context"
    owns_surfaces:
      - "customer_ordering"
    owns_api_families:
      - "customer_public_api"
    depends_on:
      - "customer_qr_presence"
      - "tenant_tables"
    status: "defined"
    source_documents:
      - "specs/03-domain/customer-order-session-workflow.yaml"
      - "specs/13-security-compliance/customer-access-security.yaml"
    done_when:
      - "customer_session_authority_defined"
      - "bill_membership_rules_defined"
      - "guest_continuity_rules_defined"

  - id: "tenant_cart"
    name: "Tenant Cart"
    scope: "tenant_scope"
    responsibility: "Own customer cart state, cart item mutation, cart validation against current menu and station configuration, and conversion from cart to submitted order."
    owns_data:
      - "carts"
      - "cart_items"
      - "cart_validation_state"
    owns_surfaces:
      - "customer_ordering"
    owns_api_families:
      - "customer_public_api"
    depends_on:
      - "tenant_customer_sessions"
      - "customer_qr_presence"
      - "tenant_menu_catalog"
    done_when:
      - "cart_storage_authority_defined"
      - "cart_mutation_authorization_defined"
      - "cart_to_order_conversion_defined"

  - id: "tenant_ordering"
    name: "Tenant Ordering"
    scope: "tenant_scope"
    responsibility: "Own submitted orders, order items, item status, order item lifecycle, order cancellation before station acceptance, and customer order tracking."
    owns_data:
      - "orders"
      - "order_items"
      - "order_item_status_history"
      - "order_cancellations"
    owns_surfaces:
      - "customer_ordering"
      - "floor_cash_workspace"
    owns_api_families:
      - "customer_public_api"
      - "tenant_internal_api"
    depends_on:
      - "tenant_cart"
      - "tenant_bill_sessions"
      - "tenant_station_routing"
      - "tenant_audit"
    done_when:
      - "order_submission_contract_defined"
      - "order_item_lifecycle_defined"
      - "order_cancellation_rules_defined"

  - id: "tenant_station_routing"
    name: "Tenant Station Routing"
    scope: "tenant_scope"
    responsibility: "Own order item routing to stations, station ticket creation, station ticket lifecycle, station accepted/preparing/ready states, and station board operational workflow."
    owns_data:
      - "station_tickets"
      - "station_ticket_items"
      - "station_ticket_status_history"
    owns_surfaces:
      - "station_board"
      - "floor_cash_workspace"
      - "customer_ordering"
    owns_api_families:
      - "tenant_internal_api"
      - "customer_public_api"
    depends_on:
      - "tenant_ordering"
      - "tenant_stations"
      - "tenant_menu_catalog"
    source_documents:
      - "specs/03-domain/station-order-routing.yaml"
    done_when:
      - "station_ticket_creation_rules_defined"
      - "station_status_flow_defined"
      - "station_visibility_defined"

  - id: "tenant_bill_sessions"
    name: "Tenant Bill Sessions"
    scope: "tenant_scope"
    responsibility: "Own table-based adisyon sessions, bill totals, bill item aggregation, bill visibility, and bill closure after external manual payment."
    owns_data:
      - "bill_sessions"
      - "bill_session_items"
      - "bill_totals"
      - "bill_closure_records"
    owns_surfaces:
      - "customer_ordering"
      - "floor_cash_workspace"
    owns_api_families:
      - "customer_public_api"
      - "tenant_internal_api"
    depends_on:
      - "tenant_tables"
      - "tenant_ordering"
      - "tenant_checkout"
    done_when:
      - "bill_session_creation_rule_defined"
      - "bill_total_calculation_defined"
      - "bill_closure_rule_defined"

  - id: "tenant_checkout"
    name: "Tenant Checkout"
    scope: "tenant_scope"
    responsibility: "Own manual payment received records, manual payment method tracking, checkout state, and cashier-driven bill close workflow."
    owns_data:
      - "checkout_records"
      - "manual_payment_records"
      - "payment_method_labels"
    owns_surfaces:
      - "floor_cash_workspace"
    owns_api_families:
      - "tenant_internal_api"
    depends_on:
      - "tenant_bill_sessions"
      - "tenant_identity_access"
      - "tenant_audit"
    explicit_non_goals:
      - "online_payment_collection"
      - "payment_gateway_integration"
      - "pos_integration"
      - "fiscal_device_integration"
      - "e_invoice_or_e_archive_generation"
    done_when:
      - "manual_payment_record_contract_defined"
      - "bill_close_authorization_defined"
      - "non_goals_preserved"

  - id: "tenant_floor_service"
    name: "Tenant Floor Service"
    scope: "tenant_scope"
    responsibility: "Own floor staff view of tables, ready items, served marking, service progress, and floor-level intervention before privileged escalation."
    owns_data:
      - "served_mark_records"
      - "floor_service_events"
    owns_surfaces:
      - "floor_cash_workspace"
    owns_api_families:
      - "tenant_internal_api"
    depends_on:
      - "tenant_tables"
      - "tenant_ordering"
      - "tenant_station_routing"
      - "tenant_identity_access"
    done_when:
      - "served_marking_rules_defined"
      - "floor_visibility_rules_defined"
      - "floor_intervention_rules_defined"

  - id: "tenant_audit"
    name: "Tenant Audit"
    scope: "tenant_scope"
    responsibility: "Own tenant-scoped audit records for sensitive operational changes, privileged cancellation, bill closure, security-relevant customer QR behavior, and administrative actions."
    owns_data:
      - "tenant_audit_log"
    owns_surfaces:
      - "tenant_setup_console"
      - "floor_cash_workspace"
    owns_api_families:
      - "tenant_internal_api"
    depends_on:
      - "tenant_identity_access"
    done_when:
      - "tenant_audit_event_catalog_defined"
      - "tenant_audit_retention_defined"
      - "sensitive_action_audit_rules_defined"

  - id: "platform_audit"
    name: "Platform Audit"
    scope: "platform_scope"
    responsibility: "Own platform-scoped audit records for tenant lifecycle changes, provisioning jobs, schema change jobs, platform user actions, and support access."
    owns_data:
      - "platform_audit_log"
    owns_surfaces:
      - "platform_control_plane"
    owns_api_families:
      - "platform_api"
    depends_on:
      - "platform_identity_access"
    done_when:
      - "platform_audit_event_catalog_defined"
      - "platform_audit_retention_defined"
      - "support_action_audit_rules_defined"

  - id: "table_device_qr_display"
    name: "Table Device QR Display"
    scope: "tenant_scope"
    responsibility: "Own ESP32 TFT QR display behavior, device connection route, device authentication, QR refresh display loop, and device health visibility."
    owns_data:
      - "table_devices"
      - "device_keys"
      - "device_bindings"
      - "device_heartbeat"
    owns_surfaces:
      - "table_device_endpoint"
      - "tenant_setup_console"
    owns_api_families:
      - "tenant_internal_api"
    depends_on:
      - "tenant_tables"
      - "customer_qr_presence"
    status: "defined"
    source_documents:
      - "specs/09-realtime-device-contracts/esp32-device-identity.yaml"
    done_when:
      - "device_identity_model_defined"
      - "device_binding_rules_defined"
      - "qr_display_refresh_protocol_defined"

  - id: "technical_operations"
    name: "Technical Operations"
    scope: "shared_scope"
    responsibility: "Own health checks, readiness checks, deployment operations, recovery procedures, backup and restore procedures, secret rotation, and operational maintenance metadata."
    owns_data:
      - "technical_operations_metadata"
      - "health_check_results"
      - "maintenance_records"
    owns_surfaces:
      - "technical_operations"
    owns_api_families:
      - "platform_api"
      - "tenant_internal_api"
    depends_on:
      - "platform_tenant_lifecycle"
      - "platform_database_schema_orchestration"
    done_when:
      - "health_checks_defined"
      - "backup_restore_policy_defined"
      - "deployment_topology_defined"

  - id: "shared_observability"
    name: "Shared Observability"
    scope: "shared_scope"
    responsibility: "Own structured logging, metrics, tracing conventions, correlation identifiers, error reporting, and operational visibility standards."
    owns_data:
      - "logs"
      - "metrics"
      - "traces"
      - "correlation_ids"
    owns_surfaces:
      - "technical_operations"
    owns_api_families: []
    depends_on: []
    done_when:
      - "structured_logging_policy_defined"
      - "metric_catalog_defined"
      - "correlation_id_policy_defined"

  - id: "shared_rate_limiting"
    name: "Shared Rate Limiting"
    scope: "shared_scope"
    responsibility: "Own rate limits for public customer APIs, QR endpoints, device endpoints, auth endpoints, and abuse-sensitive operations."
    owns_data:
      - "rate_limit_counters"
      - "abuse_detection_events"
    owns_surfaces:
      - "customer_ordering"
      - "table_device_endpoint"
      - "identity_activation"
    owns_api_families:
      - "customer_public_api"
      - "tenant_internal_api"
      - "platform_api"
    depends_on:
      - "shared_observability"
    done_when:
      - "rate_limit_dimensions_defined"
      - "qr_abuse_limits_defined"
      - "auth_rate_limits_defined"

external_or_excluded_modules:
  - id: "external_payment_gateway"
    status: "excluded"
    reason: "IoTable does not collect payments."
  - id: "external_pos_device"
    status: "excluded"
    reason: "IoTable does not integrate with POS devices."
  - id: "external_fiscal_device"
    status: "excluded"
    reason: "IoTable does not integrate with fiscal devices."
  - id: "external_e_invoice_or_archive"
    status: "excluded"
    reason: "IoTable does not generate e-invoice or e-archive documents."

module_dependency_rules:
  - id: "MDR-001"
    rule: "A module MUST own its primary data contracts."
  - id: "MDR-002"
    rule: "A module MUST NOT write another module's owned data except through that module's defined API or application service contract."
  - id: "MDR-003"
    rule: "Platform-scope modules MUST NOT directly own tenant operational data."
  - id: "MDR-004"
    rule: "Tenant-scope modules MUST NOT directly own platform control-plane data."
  - id: "MDR-005"
    rule: "Shared modules MUST provide infrastructure behavior without owning business decisions."
  - id: "MDR-006"
    rule: "Excluded modules MUST remain out of implementation scope unless a new owner decision changes the product baseline."

open_decisions: []

done_when:
  - "all_major_business_capability_modules_are_defined"
  - "platform_scope_modules_are_defined"
  - "tenant_scope_modules_are_defined"
  - "shared_scope_modules_are_defined"
  - "excluded_modules_are_defined"
  - "module_data_ownership_is_defined"
  - "module_surface_ownership_is_defined"
  - "module_api_family_ownership_is_defined"
  - "module_dependencies_are_defined"
  - "open_module_decisions_are_recorded"
